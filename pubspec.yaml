name: bin_obaid_mobile
description: Bin Obaid Trading Stores - Professional Mobile App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # إدارة الحالة والمسارات
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  
  # تخزين البيانات والشبكات
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  
  # واجهة المستخدم والصور
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  
  # معالجة الملفات والصور
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  screenshot: ^3.0.0
  file_picker: ^8.0.0+1
  
  # التقارير والطباعة والمشاركة
  excel: ^4.0.3
  pdf: ^3.10.8
  printing: ^5.13.2
  share_plus: ^10.0.0
  
  # الإشعارات والوقت والصلاحيات
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  intl: ^0.19.0
  permission_handler: ^11.3.1
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
